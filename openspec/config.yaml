schema: spec-driven

context: |
  ## Project: SAP AI Provider for Vercel AI SDK

  TypeScript/Node.js library providing integration between SAP AI Core and Vercel AI SDK.
  Enables developers to use SAP's AI services through the standardized AI SDK interface.

  ### Tech Stack
  - Language: TypeScript (strict mode)
  - Runtime: Node.js 20+ and Edge runtime compatible
  - Build: tsup (CommonJS + ESM + .d.ts)
  - Test: Vitest (node + edge configs)
  - Formatting: Prettier + ESLint

  ### Key Dependencies
  - Runtime: @ai-sdk/provider, @ai-sdk/provider-utils, @sap-ai-sdk/orchestration, @sap-ai-sdk/foundation-models, zod
  - Peer: ai (Vercel AI SDK ^5.0.0 || ^6.0.0)
  - SAP SDKs: @sap-ai-sdk/orchestration, @sap-ai-sdk/foundation-models

  ### Architecture Patterns
  - Implements Vercel AI SDK ProviderV3 interface
  - Uses zod schemas for validation
  - Lazy loading for optional dependencies
  - Strategy Pattern for API abstraction
  - Must work in both Node.js and Edge runtimes

  ### Source Structure
  - src/index.ts - V3 public API exports (main entry)
  - src/index-v2.ts - V2 public API exports (facade entry)
  - src/sap-ai-provider.ts - V3 provider factory
  - src/sap-ai-provider-v2.ts - V2 provider factory (wraps V3)
  - src/sap-ai-language-model.ts - V3 language model (LanguageModelV3)
  - src/sap-ai-language-model-v2.ts - V2 language model (wraps V3)
  - src/sap-ai-embedding-model.ts - V3 embedding model (EmbeddingModelV3)
  - src/sap-ai-embedding-model-v2.ts - V2 embedding model (wraps V3)
  - src/sap-ai-adapters-v3-to-v2.ts - V3→V2 format conversion
  - src/sap-ai-settings.ts - Types, settings, and SAP SDK re-exports
  - src/sap-ai-provider-options.ts - Zod schemas for provider options
  - src/sap-ai-validation.ts - API resolution and validation
  - src/sap-ai-error.ts - Error handling (UnsupportedFeatureError, ApiSwitchError)
  - src/sap-ai-strategy.ts - Strategy factory (lazy loading)
  - src/base-language-model-strategy.ts - Base language model strategy (Template Method)
  - src/base-embedding-model-strategy.ts - Base embedding model strategy (Template Method)
  - src/orchestration-language-model-strategy.ts - Orchestration API language model
  - src/orchestration-embedding-model-strategy.ts - Orchestration API embedding model
  - src/foundation-models-language-model-strategy.ts - Foundation Models API language model
  - src/foundation-models-embedding-model-strategy.ts - Foundation Models API embedding model
  - src/strategy-utils.ts - Shared strategy utilities
  - src/convert-to-sap-messages.ts - Message format conversion
  - src/deep-merge.ts - Deep merge utility
  - src/version.ts - Package version constant

  ### Conventions
  - JSDoc comments required for all public APIs
  - Use Vercel AI SDK standard errors
  - Follow existing patterns in codebase
  - Tests mirror source file structure (*.test.ts)

  ### Validation Command
  npm run type-check && npm run test && npm run test:node && npm run test:edge && npm run prettier-check && npm run lint && npm run build && npm run check-build && npm run build:v2 && npm run check-build:v2

